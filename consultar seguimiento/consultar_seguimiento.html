<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta Integral - Valientes</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="consultas_caso.css" rel="stylesheet">
</head>
<body>

    <header class="top-bar">
        <div class="container-fluid d-flex align-items-center justify-content-between px-4">
            <button id="volver-btn" class="btn-regresar">
                <i class="bi bi-arrow-left"></i> Volver
            </button>



            
            <div class="user-status">
                <span class="badge-status">Seguimiento de Casos</span>
            </div>
        </div>
    </header>

    <main class="main-content">


        


        <div class="container-fluid">


            
            <div class="row justify-content-center">
                <div class="col-xl-11 col-xxl-10">
                    
                    <div class="main-card">



                        
                        <div class="card-header-clean">
                            <div class="header-info">
                                <h1>Consulta de Seguimiento Integral</h1>
                                <p>Monitoreo de salud, seguridad y avances del equipo</p>
                            </div>
                        </div>



                        <div class="container-principal">
        <div class="card-busqueda-integral">
            

             <div class="card-body-content">

                <section class="search-section">
                            
                            
            <form id="formulario_busqueda" class="modern-search-triple">
                <div class="row current-search-row">
                    
                    <div class="col-md-5">
                        <label class="form-label">Buscar por Nombre Completo</label>
                        <input type="text" id="buscador_nombre" class="form-control-lila" placeholder="Escriba para buscar...">
                    </div>
                    
                    <div class="col-md-4">
                        <label class="form-label">ID Vinculado</label>
                        <input type="text" id="user_id" name="user_id" class="form-control input-locked" readonly placeholder="ID único" required>
                    </div>
                    
                    <div class="col-md-3">
                        <button class="btn-search-lila" type="button" id="btn_buscar_u">
                            <i class="bi bi-search"></i> Buscar
                        </button>
                    </div>

                </div>
                <div id="lista_sugerencias" class="list-group mt-2 suggestion-box" style="display: none;"></div>
            </form>

</div>
</section>



                        <div class="card-body-content">
                            <section class="search-section">
                                <form id="formBusqueda" class="modern-search-triple">
                                    <div class="date-inputs">
                                        <div class="input-group-custom">
                                            <label>Desde:</label>
                                            <input type="date" id="busquedaFecha" name="busquedaFecha" required>
                                        </div>
                                        <div class="input-group-custom">
                                            <label>Hasta:</label>
                                            <input type="date" id="busquedaFecha2" name="busquedaFecha2" required>
                                        </div>
                                    </div>
                                    <div class="input-wrapper">
                                        <i class="bi bi-search search-icon"></i>
                                        <input type="text" id="busqueda" name="busqueda" placeholder="Nombre o ID del caso..." required>
                                    </div>
                                    <button class="btn-buscar" type="submit">
                                        <span>Buscar</span>
                                    </button>
                                </form>
                            </section>

                            <section class="data-section">
                                <div class="info-grid" id="tabla-resultados">
                                    
                                    <div class="info-card highlight">
                                        <div class="card-icon"><i class="bi bi-hash"></i></div>
                                        <div class="card-texts">
                                            <label>ID Seguimiento</label>
                                            <span id="td-id-seguimiento">---</span>
                                        </div>
                                    </div>

                                    <div class="info-card">
                                        <div class="card-icon"><i class="bi bi-activity"></i></div>
                                        <div class="card-texts">
                                            <label>Salud Física</label>
                                            <span id="td-salud-fisica">---</span>
                                        </div>
                                    </div>

                                    <div class="info-card">
                                        <div class="card-icon"><i class="bi bi-brain"></i></div>
                                        <div class="card-texts">
                                            <label>Salud Mental</label>
                                            <span id="td-salud-mental">---</span>
                                        </div>
                                    </div>

                                    <div class="info-card">
                                        <div class="card-icon"><i class="bi bi-shield-check"></i></div>
                                        <div class="card-texts">
                                            <label>Seguridad y Protección</label>
                                            <span id="td-seguridad-proteccion">---</span>
                                        </div>
                                    </div>

                                    <div class="info-card">
                                        <div class="card-icon"><i class="bi bi-house-door"></i></div>
                                        <div class="card-texts">
                                            <label>Vivienda</label>
                                            <span id="td-vivienda">---</span>
                                        </div>
                                    </div>

                                    <div class="info-card">
                                        <div class="card-icon"><i class="bi bi-cash-coin"></i></div>
                                        <div class="card-texts">
                                            <label>Ingresos / Medios de Vida</label>
                                            <span id="td-ingresos-vida">---</span>
                                        </div>
                                    </div>

                                    <div class="info-card">
                                        <div class="card-icon"><i class="bi bi-book"></i></div>
                                        <div class="card-texts">
                                            <label>Educación Básica</label>
                                            <span id="td-educacion-basica">---</span>
                                        </div>
                                    </div>

                                    <div class="info-card">
                                        <div class="card-icon"><i class="bi bi-people"></i></div>
                                        <div class="card-texts">
                                            <label>Redes de Apoyo</label>
                                            <span id="td-redes-apoyo">---</span>
                                        </div>
                                    </div>

                                    <div class="info-card">
                                        <div class="card-icon"><i class="bi bi-person-check"></i></div>
                                        <div class="card-texts">
                                            <label>Autonomía</label>
                                            <span id="td-autonomia">---</span>
                                        </div>
                                    </div>

                                    <div class="info-card">
                                        <div class="card-icon"><i class="bi bi-calendar-event"></i></div>
                                        <div class="card-texts">
                                            <label>Fecha Seguimiento</label>
                                            <span id="td-fecha-seguimiento">---</span>
                                        </div>
                                    </div>

                                    <div class="info-card large">
                                        <div class="card-icon"><i class="bi bi-journal-text"></i></div>
                                        <div class="card-texts">
                                            <label>Nota de Sucesos</label>
                                            <span id="td-nota-sucesos">---</span>
                                        </div>
                                    </div>

                                    <div class="info-card">
                                        <div class="card-icon"><i class="bi bi-person-plus"></i></div>
                                        <div class="card-texts">
                                            <label>Apoyo de Equipo</label>
                                            <span id="td-apoyo-equipo">---</span>
                                        </div>
                                    </div>

                                    <div class="info-card">
                                        <div class="card-icon"><i class="bi bi-exclamation-octagon"></i></div>
                                        <div class="card-texts">
                                            <label>Dificultades</label>
                                            <span id="td-dificultades-equipo">---</span>
                                        </div>
                                    </div>

                                    <div class="info-card">
                                        <div class="card-icon"><i class="bi bi-person-circle"></i></div>
                                        <div class="card-texts">
                                            <label>ID Usuario</label>
                                            <span id="td-id-usuario">---</span>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            <footer class="card-actions">
                            </footer>
                        </div> 
                    </div> 
                </div>
            </div>
        </div>
    </main>

    
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>
</html>
