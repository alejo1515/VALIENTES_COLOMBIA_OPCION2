<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Sobrevivientes - Valientes Colombia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="registro.css" rel="stylesheet">
  
    
</head>
<body>



</div>

<button id="volver-btn" class="btn btn-secondary">

volver
</button>


<div class="card-registro">
    
    <div class="card-body p-4 p-md-5">
        <h2>Registro</h2>
        <p class="text-center text-secondary mb-4">Información de la sobreviviente</p>
        
        <form id="registroform" >
            <div class="row">
                <div class="col-md-6">
                    <label class="form-label">Nombre Completo</label>
                    <input type="text"  id="nombres"  name="nombres" class="form-control" placeholder="Nombres y Apellidos" required>
                </div>

 <div class="col-md-6">
                    <label class="form-label">Ciudad de nacimiento</label>
                   
                    <input type="text" id="lugar_nacimiento"  name="lugar_nacimiento" class="form-control" placeholder="Ej: Bogotá" required>
                   </div>
                   

            </div>

            <div class="row">
                <div class="col-md-6">
                    <label class="form-label">Fecha de Nacimiento</label>
                    <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Ciudad de Residencia</label>
                    <input type="text" id="ciudad"  name="ciudad" class="form-control" placeholder="Ej: Bogotá" required>
                </div>
            
            </div>

            <div class="row">
                <div class="col-md-6">
                    <label class="form-label">EPS</label>
                    <input type="text" id="eps" name="eps" class="form-control" placeholder="Ej: Capital Salud" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Tipo de Afiliación EPS</label>
                    <select name="tipo_afiliacion_eps"  id="tipo_afiliacion_eps" class="form-select" required>
                        <option selected disabled>Seleccione régimen</option>
                        <option value="Subsidiado">Subsidiado</option>
                        <option value="Contributivo">Contributivo</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <label class="form-label">Ocupación</label>
                    <input type="text" name="ocupacion" id="ocupacion" class="form-control" placeholder="Ej: Enfermera, Estudiante..." required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Nivel Educativo</label>
                    <select name="nivel_educativo" class="form-select" id="nivel_educativo" required>
                        <option selected disabled>Seleccione nivel</option>
                        <option value="Primaria">Primaria</option>
                        <option value="Bachillerato">Bachillerato</option>
                        <option value="Tecnico">Técnico / Tecnólogo</option>
                        <option value="Universitario">Universitario</option>
                    </select>
                </div>
                   <div class="row">
                   
                                      
                </div>
            </div>

            <div class="mt-4">
                <button id="submit" class="btn btn-valientes shadow-sm">Guardar Registro</button>
            </div>


            
        </form>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
