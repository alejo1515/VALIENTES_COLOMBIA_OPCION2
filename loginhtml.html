<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
       <link href="login.css" rel="stylesheet">
</head>
<body>
   <div class="background-animated">
        <img src="./logoa.png" class="mariposa-vuelo m-1">
        <img src="./logoa.png" class="mariposa-vuelo m-2">
        <img src="./logoa.png" class="mariposa-vuelo m-3">
        <img src="./logoa.png" class="mariposa-vuelo m-4">
    </div>


    <div class="garden">
<div class ="butterfly">   </div>

</div>
    <div class="login-card">
        <div class="text-center mb-4">
            <img src="./valientescol_cover.jpg" alt="logotipo valientes" class ="logo_flotante" width="250" height="auto" >
            <h2 style="color: #8881eb; font-weight: 800;">BIENVENIDA</h2>
            <p class="text-muted">Ingresa a tu cuenta</p>
        </div>
        
        <form id="login-user">
            <div class="mb-3">
                <label for="usuario" class="form-label">Nombre de usuaria</label>
                <input type="text" 
                       class="form-control" 
                       id="USERNAME" 
                       name="USERNAME" 
                       required 
                       placeholder="Ej: Minerva123"
                       pattern="[A-Za-z0-9]+" 
                       title="Solo letras y números para mayor seguridad.">
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="PASSWORD" name="PASSWORD" required>
            </div>

            <div class="d-grid">
                <button type="submit" id="submit" class="btn btn-fem btn-lg shadow-sm">Iniciar Sesión</button>

            </div>
        </form>

    </div>
<script src="app.js"></script>
</body>
</html>
