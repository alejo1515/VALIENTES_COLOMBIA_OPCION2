<!DOCTYPE html>
<html lang="es">
<head>  
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta de Usuario</title>
    <link rel="stylesheet" href="cuentausuario.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>  

    <button type="button" id="volver-btn" class="btn">
        <i class="bi bi-arrow-left"></i> Volver
    </button>

    <div class="registro-container">
        <form class="form-card" id="formRegistro">

            <div class="header-logo">
                <div class="logo-text text-uppercase fw-bold text-dark">CREA TU USUARIO</div>
            </div>

            <div class="card-body p-3 mt-4">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej: Juana de Arco" required>

                <label for="username">Nombre de Usuario:</label>
                <input type="text" id="username" name="username" placeholder="Juana123" required>

                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>

                <label for="ciudad">Ciudad de nacimiento:</label>
                <input type="text" id="ciudad" name="ciudad" placeholder="Ej: Bogotá" required>

                <button type="submit" class="btn-registrar" id="submit">Crear Cuenta</button>
            </div>
            
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
